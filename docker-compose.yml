version: "3.8"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
      - "4050:4050"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:4000
      - VITE_WS_URL=ws://backend:4050
    depends_on:
      - backend
    restart: unless-stopped